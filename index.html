<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sasha Super App</title>
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding: 15px; color: #333; margin: 0; }
        .page { display: none; padding: 10px; }
        .active { display: block; }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 20px; }
        
        /* Кнопки меню */
        .menu-btn { 
            display: block; width: 100%; padding: 18px; margin-bottom: 12px; 
            background: white; border-radius: 15px; text-decoration: none; 
            color: #333; font-weight: bold; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            font-size: 16px; text-align: left;
        }

        /* Сетка для кнопок */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { 
            padding: 18px; border-radius: 12px; color: white; text-decoration: none; 
            text-align: center; font-weight: bold; font-size: 14px;
        }
        
        /* Цвета */
        .ozon { background: #005bff; } .wb { background: #cb11ab; }
        .kufar { background: #00b012; } .onliner { background: #ffcc00; color: black; }
        .vek { background: #e30613; } .avia { background: #00a1ff; } .rzd { background: #e21a1a; }
        .btn-blue { background: #0088cc; color: white; width: 100%; border: none; padding: 15px; border-radius: 12px; font-weight: bold; }

        input, textarea { 
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #ddd; 
            margin-bottom: 15px; box-sizing: border-box; font-size: 16px;
        }
        .back-btn { margin-top: 25px; color: #0088cc; border: none; background: none; width: 100%; font-size: 16px; }
    </style>
</head>
<body>

    <!-- ГЛАВНОЕ МЕНЮ -->
    <div id="main-menu" class="page active">
        <h2>🚀 Мои Сервисы</h2>
        <button class="menu-btn" onclick="showPage('tickets-page')">✈️ 1. Билеты (Авиа / ЖД)</button>
        <button class="menu-btn" onclick="window.open('https://tb.by', '_blank')">💵 2. Конвертер (Технобанк)</button>
        <button class="menu-btn" onclick="showPage('shop-page')">🛍️ 3. Магазины (WB, 21vek, Ozon...)</button>
        <button class="menu-btn" onclick="showPage('pc-compare')">🖥️ 4. Сравнение ПК</button>
    </div>

    <!-- 1. БИЛЕТЫ -->
    <div id="tickets-page" class="page">
        <h2>Где ищем билеты?</h2>
        <div class="grid">
            <a href="https://aviasales.ru" target="_blank" class="card avia">Aviasales</a>
            <a href="https://rzd.ru" target="_blank" class="card rzd">РЖД</a>
        </div>
        <button class="back-btn" onclick="showPage('main-menu')">← Назад</button>
    </div>

    <!-- 3. МАГАЗИНЫ -->
    <div id="shop-page" class="page">
        <h2>Поиск товаров</h2>
        <input type="text" id="shopSearch" placeholder="Что ищем?" oninput="updateShopLinks()">
        <div class="grid">
            <a id="wb" href="https://wildberries.ru" target="_blank" class="card wb">Wildberries</a>
            <a id="vek" href="https://21vek.by" target="_blank" class="card vek">21vek.by</a>
            <a id="ozon" href="https://ozon.ru" target="_blank" class="card ozon">Ozon</a>
            <a id="kufar" href="https://kufar.by" target="_blank" class="card kufar">Kufar</a>
            <a id="onliner" href="https://onliner.by" target="_blank" class="card onliner" style="grid-column: span 2;">Onliner.by</a>
        </div>
        <button class="back-btn" onclick="showPage('main-menu')">← Назад</button>
    </div>

    <!-- 4. СРАВНЕНИЕ ПК -->
    <div id="pc-compare" class="page">
        <h2>Сравнение ПК</h2>
        <textarea id="pcInput" rows="3" placeholder="Например: RTX 3060 vs RTX 4060"></textarea>
        <button class="btn-blue" onclick="comparePC()">Найти тесты и сравнение</button>
        <button class="back-btn" onclick="showPage('main-menu')">← Назад</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        function updateShopLinks() {
            const q = encodeURIComponent(document.getElementById('shopSearch').value);
            if(q) {
                document.getElementById('wb').href = "https://wildberries.ru" + q;
                document.getElementById('vek').href = "https://21vek.by" + q;
                document.getElementById('ozon').href = "https://ozon.ru" + q;
                document.getElementById('kufar').href = "https://kufar.by" + q;
                document.getElementById('onliner').href = "https://onliner.by" + q;
            }
        }

        function comparePC() {
            const input = document.getElementById('pcInput').value.trim();
            if (input) {
                window.open("https://technical.city" + encodeURIComponent(input), '_blank');
            }
        }
    </script>
</body>
</html>
