<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi App</title>
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 400px; }
        .card { background: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); cursor: pointer; transition: 0.2s; }
        .card:active { transform: scale(0.95); }
        .card i { font-size: 30px; display: block; margin-bottom: 10px; }
        h3 { margin: 0; font-size: 14px; color: #333; }
    </style>
</head>
<body>
    <div class="grid">
        <div class="card" onclick="window.location.href='https://tb.by'">
            <i>💰</i><h3>Технобанк</h3>
        </div>
        <div class="card" onclick="openSearch()">
            <i>🛍</i><h3>Магазин</h3>
        </div>
        <div class="card" onclick="window.location.href='https://aviasales.by'">
            <i>✈️</i><h3>Билеты</h3>
        </div>
        <div class="card" onclick="window.location.href='https://ominds.ru'">
            <i>🌐</i><h3>Мой сайт</h3>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        function openSearch() {
            let query = prompt("Что найти?");
            if (query) {
                window.location.href = "https://21vek.by" + encodeURIComponent(query);
            }
        }
    </script>
</body>
</html>
